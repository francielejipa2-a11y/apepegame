    <style>
    :root {
    --apepe-green: #9fe01b;
    --apepe-green-dark: #4f7f13;
    --apepe-purple: #7b3fe4;
    --apepe-orange: #ff9d16;
    --apepe-black: #07090b;
    --apepe-panel: #12161a;
    --apepe-text: #f4f5ed;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;

    background-color: var(--apepe-black);
    background-image:
        linear-gradient(
            rgba(7, 9, 11, 0.76),
            rgba(7, 9, 11, 0.92)
        ),
        url("levels/usogeral/9078.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* Luzes coloridas discretas no fundo */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;

    background:
        radial-gradient(
            circle at 12% 25%,
            rgba(159, 224, 27, 0.20),
            transparent 30%
        ),
        radial-gradient(
            circle at 88% 72%,
            rgba(123, 63, 228, 0.22),
            transparent 32%
        );

    z-index: 0;
}

/* Textura geométrica inspirada na identidade Apepe */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    background-image:
        url("levels/usogeral/polygon-logo-monochrome-light.png"),
        url("levels/usogeral/polygon-logo-monochrome-light.png");

    background-repeat: no-repeat;

    background-position:
        left 3% top 12%,
        right 3% bottom 12%;

    background-size:
        310px auto,
        310px auto;

    opacity: 0.10;
    filter: drop-shadow(0 0 14px rgba(123, 63, 228, 0.75));
}

.game-container {
    position: relative;
    z-index: 1;

    width: 1290px;
    height: 730px;

    margin: 0 auto;
    top: 50vh;
    transform: translateY(-50%);

    background-color: var(--apepe-panel);
    border: 5px solid var(--apepe-green);
    border-radius: 6px;

    box-shadow:
        0 0 0 4px #050605,
        0 0 0 7px var(--apepe-purple),
        0 18px 45px rgba(0, 0, 0, 0.85),
        0 0 35px rgba(159, 224, 27, 0.22);

    overflow: visible;
}

.game-container::before {
    content: "";
    position: absolute;
    inset: -15px;
    z-index: -1;
    pointer-events: none;

    border: 2px solid rgba(255, 157, 22, 0.55);
    border-radius: 8px;
}

canvas {
    display: block;
    width: 1280px;
    height: 720px;

    image-rendering: pixelated;
    cursor: crosshair;
    background-color: #000;

    border-radius: 2px;
}

.top-buttons,
.footer-buttons {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;

    padding: 8px;

    background: rgba(7, 9, 11, 0.90);
    border: 2px solid rgba(159, 224, 27, 0.55);
    border-radius: 8px;

    box-shadow:
        0 8px 22px rgba(0, 0, 0, 0.65),
        0 0 16px rgba(123, 63, 228, 0.20);

    backdrop-filter: blur(6px);
}

.top-buttons {
    top: -88px;
}

.footer-buttons {
    bottom: -88px;
}

.btn {
    min-width: 170px;
    padding: 12px 22px;

    color: var(--apepe-text);
    background-color: #171c20;

    border: 2px solid var(--apepe-green);
    border-radius: 6px;

    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0;
    text-align: center;
    text-decoration: none;
    text-transform: uppercase;

    cursor: pointer;

    box-shadow:
        4px 4px 0 var(--apepe-purple),
        inset 0 -3px 0 rgba(0, 0, 0, 0.35);

    transition:
        color 0.16s ease,
        background-color 0.16s ease,
        border-color 0.16s ease,
        transform 0.16s ease,
        box-shadow 0.16s ease;
}

.btn:hover {
    color: #101408;
    background-color: var(--apepe-green);
    border-color: var(--apepe-orange);

    transform: translateY(-2px);

    box-shadow:
        5px 6px 0 var(--apepe-purple),
        0 0 18px rgba(159, 224, 27, 0.38);
}

.btn:active {
    transform: translate(3px, 3px);

    box-shadow:
        1px 1px 0 var(--apepe-purple);
}

.btn:focus-visible {
    outline: 3px solid var(--apepe-orange);
    outline-offset: 4px;
}
</style>

        class CuboCrescimento {
            constructor(x, y) {

                this.h = 64;
                this.usado = false;
                this.bumpTempo = 0;

            ativar() {
                if (this.usado) return;
                this.usado = true;
                this.bumpTempo = 1;

                sfxCuboCrescimento.pause();
                sfxCuboCrescimento.currentTime = 0;

                    fase: "subindo",
                    tempo: 0,
                    duracaoSubida: 34,
                    coletada: false
                });
            }

            atualizar() {
                if (this.bumpTempo > 0) {
                    this.bumpTempo++;
                    if (this.bumpTempo > this.bumpDuracao) this.bumpTempo = 0;
                }
            }

            obterDeslocamentoY() {
                if (this.bumpTempo === 0) return 0;
                const progresso = this.bumpTempo / this.bumpDuracao;
                return Math.sin(progresso * Math.PI) * 9;
            }

            desenhar() {
                if (!imgCuboCrescimento.complete || imgCuboCrescimento.naturalWidth === 0) return;
                ctx.save();
                if (this.usado) ctx.filter = "grayscale(0.65) brightness(0.78)";
                ctx.drawImage(
                    imgCuboCrescimento,
                    this.x,
                    this.y - this.obterDeslocamentoY(),
                    this.w,
                    this.h
                );
                ctx.restore();
            }

            resetar() {
                this.usado = false;
                this.bumpTempo = 0;
            }
        }

                const sobrepostoX =
                    cat.worldX + metadeHitbox > cubo.x + 7 &&
                    cat.worldX - metadeHitbox < cubo.x + cubo.w - 7;

                const atravessouBase =
                    cat.velY < 0 &&
                    topoAnterior >= baseCubo - 3 &&
                    cat.y <= baseCubo + 3;

                    const progresso = Math.min(1, moeda.tempo / moeda.duracaoSubida);
                    const suavizado = 1 - Math.pow(1 - progresso, 3);
                    moeda.y = moeda.inicioY + (moeda.alvoY - moeda.inicioY) * suavizado;

                    if (progresso >= 1) {
                        moeda.y = moeda.alvoY;
                        moeda.fase = "flutuando";
                        moeda.tempo = 0;
                    }
                } else {
                    moeda.y = moeda.alvoY + Math.sin(moeda.tempo * 0.09) * 4;

        function desenharTodasHitboxes() {
            if (!debugHitboxes) return;

            const cores = {
                jogador: { borda: "#5cff72", fundo: "rgba(92, 255, 114, 0.12)" },

            function desenharRetanguloMundo(ret, cor, rotulo, opcoes = {}) {
                if (!ret || ![ret.x, ret.y, ret.w, ret.h].every(Number.isFinite) || ret.w <= 0 || ret.h <= 0) return;

                const telaX = ret.x - cameraX;
                if (telaX + ret.w < -4 || telaX > canvas.width + 4 || ret.y + ret.h < -4 || ret.y > canvas.height + 4) return;

                ctx.save();
                ctx.setLineDash(opcoes.tracejado ? [7, 5] : []);
                ctx.lineWidth = opcoes.espessura || 2;
                ctx.strokeStyle = cor.borda;
                if (opcoes.preencher !== false) {
                    ctx.fillStyle = cor.fundo;
                    ctx.fillRect(telaX, ret.y, ret.w, ret.h);
                }
                ctx.strokeRect(Math.round(telaX) + 0.5, Math.round(ret.y) + 0.5, Math.round(ret.w), Math.round(ret.h));

                if (rotulo && ret.w >= 30 && ret.h >= 14) {
                    const texto = String(rotulo);
                    const larguraTexto = Math.ceil(ctx.measureText(texto).width) + 6;
                    const rotuloX = Math.max(2, Math.min(canvas.width - larguraTexto - 2, telaX + 2));
                    const rotuloY = Math.max(2, Math.min(canvas.height - 15, ret.y + 2));
                    ctx.fillStyle = "rgba(0, 0, 0, 0.78)";
                    ctx.fillRect(rotuloX, rotuloY, larguraTexto, 14);
                    ctx.fillStyle = cor.borda;
                    ctx.fillText(texto, rotuloX + 3, rotuloY + 2);
                }
                ctx.restore();

                if (opcoes.contar !== false) totalVisivel++;
            }

            // Faixas de movimento primeiro, para ficarem atras das hitboxes reais.
            mapa.forEach(p => {
                if (!p.movel) return;
                if (p.eixo === "y") {
                    const minY = p.minY !== undefined ? p.minY : (p.baseY !== undefined ? p.baseY : p.y);
                    const maxY = p.maxY !== undefined ? p.maxY : (p.baseY !== undefined ? p.baseY : p.y);
                    desenharRetanguloMundo(
                        { x: p.x, y: Math.min(minY, maxY), w: p.w, h: Math.abs(maxY - minY) + p.h },
                        cores.movel,
                        "trajeto Y",
                        { tracejado: true, preencher: false, espessura: 1, contar: false }
                    );
                } else {
                    const minX = p.minX !== undefined ? p.minX : (p.baseX !== undefined ? p.baseX : p.x);
                    const maxX = p.maxX !== undefined ? p.maxX : (p.baseX !== undefined ? p.baseX : p.x);
                    desenharRetanguloMundo(
                        { x: Math.min(minX, maxX), y: p.y, w: Math.abs(maxX - minX) + p.w, h: p.h },
                        cores.movel,
                        "trajeto X",
                        { tracejado: true, preencher: false, espessura: 1, contar: false }

            });

            mapa.forEach(p => {
                let cor = cores.solido;

                if (p.objeto) {

                desenharRetanguloMundo({ x: p.x, y: p.y, w: p.w, h: p.h }, cor, rotulo);

                if (p.objeto && p.objeto.estado === "normal") {
                    desenharRetanguloMundo(

            });

            entidadesPerigo.forEach(ent => {
                desenharRetanguloMundo(

            cubosCrescimento.forEach(cubo => {
                desenharRetanguloMundo(
                    { x: cubo.x, y: cubo.y, w: cubo.w, h: cubo.h },
                    cores.ativacao,
                    cubo.usado ? "cubo usado" : "cubo extra"
                );
                desenharRetanguloMundo(
                    { x: cubo.x + 7, y: cubo.y + cubo.h - 6, w: cubo.w - 14, h: 12 },

        function atualizarPlataformasMoveis() {
            mapa.forEach(p => {
                if (!p.movel) return;
                if (p.baseX === undefined) p.baseX = p.x;
                if (p.baseY === undefined) p.baseY = p.y;
                if (p.dirInicial === undefined) p.dirInicial = p.dir || 1;

                p.prevX = p.x;
                p.prevY = p.y;

                const velocidade = p.vel || 1;
                const direcao = p.dir || 1;

                if (p.eixo === "y") {
                    const minY = p.minY !== undefined ? p.minY : p.baseY;
                    const maxY = p.maxY !== undefined ? p.maxY : p.baseY;
                    p.y += velocidade * direcao;
                    if (p.y <= minY) { p.y = minY; p.dir = 1; }
                    else if (p.y >= maxY) { p.y = maxY; p.dir = -1; }
                } else {
                    const minX = p.minX !== undefined ? p.minX : p.baseX;
                    const maxX = p.maxX !== undefined ? p.maxX : p.baseX;
                    p.x += velocidade * direcao;
                    if (p.x <= minX) { p.x = minX; p.dir = 1; }
                    else if (p.x >= maxX) { p.x = maxX; p.dir = -1; }
                }

                p.dx = p.x - p.prevX;
                p.dy = p.y - p.prevY;
            });
        }

        function resetarPlataformasMoveis() {
            mapa.forEach(p => {
                if (!p.movel) return;
                if (p.baseX !== undefined) p.x = p.baseX;
                if (p.baseY !== undefined) p.y = p.baseY;
                p.dir = p.dirInicial || 1;
                p.dx = 0;
                p.dy = 0;
            });
        }

             function executarTeleporte(destino) {
                    cat.worldX = destino.x;
                    cat.y = destino.y;
                    cat.velX = 0;
                    cat.velY = 0;
                    cat.boostAtivo = false;

        class InimigoMinibear {
            constructor(x, y, limiteEsq, limiteDir, velMult = 0.25) {
                this.x = x;
                this.y = y;
                this.w = 78;
                this.h = 120;
                this.limiteEsq = limiteEsq;
                this.limiteDir = limiteDir;
                this.velBase = velMaxBase * velMult;
                this.velX = this.velBase;
                this.vida = 2;
                this.morto = false;
                this.direcao = 1;
                this.frame = 0;
                this.timerAnim = 0;
                this.emDash = false;
                this.cooldownDano = 0;
                this.timerMorte = 0;
                this.timerRastro = 0;
                this.rastros = [];
            }

            atualizar(cat) {
                if (this.morto) return;

                // --- LÓGICA DE MORTE ---
                if (this.timerMorte > 0) {
                    this.timerMorte--;
                    if (this.timerMorte <= 0) this.morto = true; // Desaparece para sempre
                    return; // Bloqueia movimento e colisão se estiver morrendo
                }

                // --- MOVIMENTO E IA ---
                let dist = Math.abs(this.x - cat.worldX);
                let olhando = (this.direcao === 1 && cat.worldX > this.x) || (this.direcao === -1 && cat.worldX < this.x);

                if (dist < 180 && !this.emDash && olhando) {
                    this.emDash = true;
                    this.velX = (velMaxBoost * 0.8) * this.direcao;
                } else if (dist > 250) {
                    this.emDash = false;
                    this.velX = this.velBase * this.direcao;
                }

                this.x += this.velX;

                // Patrulha dentro dos limites informados
                if (this.x < this.limiteEsq) { this.direcao = 1; this.velX = Math.abs(this.velX); }
                if (this.x + this.w > this.limiteDir) { this.direcao = -1; this.velX = -Math.abs(this.velX); }

                // --- COLISÃO EXATA DO BOSS ---
                this.checarColisao(cat);

                // --- ANIMAÇÃO E RASTRO ---
                this.timerAnim++;
                let framesEspera = this.emDash ? 6 : 12;
                if (this.timerAnim > framesEspera) {
                    this.frame = (this.frame + 1) % imgsMiniBear.length;
                    this.timerAnim = 0;
                }

                if (this.emDash) {
                    this.timerRastro++;
                    if (this.timerRastro % 3 === 0) {
                        this.rastros.unshift({ x: this.x, y: this.y, frame: this.frame, dir: this.direcao });
                        if (this.rastros.length > 6) this.rastros.pop();
                    }
                } else if (this.rastros.length > 0) this.rastros.pop();

                if (this.cooldownDano > 0) this.cooldownDano--;
            }
            

            checarColisao(cat) {
                const hbM = { x: this.x, y: this.y, w: this.w, h: this.h };
                const hbR = { x: cat.worldX - 15, y: cat.y, w: 30, h: 95 };

                if (verificarIntersecao(hbR, hbM)) {
                    let pescat = cat.y + 95;
                    let topoM = this.y + 20;

                    // Lógica de Dano no Inimigo (Pisada)
                    if (pescat < topoM + 30 && cat.velY > 0.5 && !cat.estaNoChao) {
                        if (this.cooldownDano <= 0) {
                            this.vida--;

                            // ✅ SOM QUANDO MINIBEAR MENOR LEVA DANO
                            sfxHitNoMinibear.currentTime = 0;
                            sfxHitNoMinibear.play().catch(() => { });

                            this.cooldownDano = 50;
                            cat.velY = -12;
                            intensidadeTremor = 5;
                            setTimeout(() => intensidadeTremor = 0, 150);

                            if (this.vida <= 0) this.timerMorte = 60;
                        }
                    }
                    // Lógica de Dano no personagen (Toque lateral/parado)
                    else if (!godMode && !controlesBloqueados && this.cooldownDano <= 0) {
                        aplicarDano();
                        let dirRepulso = (cat.worldX < this.x + this.w / 2) ? -1 : 1;
                        controlesBloqueados = true;
                        cat.boostAtivo = false;
                        cat.velX = dirRepulso * 10;
                        cat.velY = -6;
                        setTimeout(() => { if (!gameOver) controlesBloqueados = false; }, 300);
                    }
                }
            }
            desenhar() {
                if (this.morto) return;

                // 1. DESENHAR RASTROS (FANTASMAS) - Apenas se estiver em Dash
                if (this.emDash && this.timerMorte === 0) {
                    this.rastros.forEach((r, i) => {
                        let imgR = imgsMiniBear[r.frame];

                        // Proteção contra imagens não carregadas (Anti-Tela Azul)
                        if (imgR && imgR.complete && imgR.naturalWidth !== 0) {
                            ctx.save();
                            // Opacidade diminui conforme o rastro envelhece
                            ctx.globalAlpha = (1 - i / this.rastros.length) * 0.3;
                            // Efeito visual de "vulto"
                            ctx.filter = "brightness(1.5) sepia(1) hue-rotate(-50deg) saturate(5)";
                            ctx.translate(r.x, r.y);

                            if (r.dir === -1) {
                                ctx.scale(-1, 1);
                                ctx.drawImage(imgR, -this.w, 0, this.w, this.h);
                            } else {
                                ctx.drawImage(imgR, 0, 0, this.w, this.h);
                            }
                            ctx.restore();
                        }
                    });
                }

                // 2. DESENHO DO CORPO PRINCIPAL DO MINIBEAR COMUM
                let img = imgsMiniBear[this.frame];
                if (img && img.complete && img.naturalWidth !== 0) {
                    ctx.save();

                    // Efeito de flash ao tomar dano ou morrer
                    if (this.timerMorte > 0 || this.cooldownDano > 0) {
                        ctx.filter = "brightness(5)";
                    }

                    ctx.translate(this.x, this.y);
                    if (this.direcao === -1) {
                        ctx.scale(-1, 1);
                        ctx.drawImage(img, -this.w, 0, this.w, this.h);
                    } else {
                        ctx.drawImage(img, 0, 0, this.w, this.h);
                    }
                    ctx.restore();
                }
            }
        
        }

                        ctx.drawImage(imgB, -miniBear.w, 0, miniBear.w, miniBear.h);
                    } else {
                        ctx.drawImage(imgB, 0, 0, miniBear.w, miniBear.h);
                    }

                    ctx.restore();
                }
            }

            // Entidades Elétricas
            entidadesPerigo.forEach(ent => {
                let arrayUso = (ent.tipo === "eletricoDireito") ? imgsAsteDireita : (ent.tipo === "eletricoEsquerdo") ? imgsAsteEsquerda : imgsAste;
                let img = arrayUso[ent.frame];
                if (img && img.complete) ctx.drawImage(img, ent.x, ent.y, ent.w * 1.5, ent.h * 1.5);
            });

            ctx.restore(); // Fecha o translate(-scrollX) do mundo

                        // === RASTRO DO BOOST (suave + efeito retrátil reforçado) ===
            if (cat.rastros.length > 0 && !emCutscene) {
                ctx.save();
                ctx.globalCompositeOperation = "screen";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ddff";

                cat.rastros.forEach((r, i) => {
                    const progress = i / (cat.rastros.length - 1 || 1);
                    let alpha = Math.pow(1 - progress, 1.8) * 0.85;

                    if (r.retract) alpha *= (1 - r.retract * 0.85); // some mais rápido

                    const delayX = cat.direcao * (i * 6); // delay menor

                    desenharcat(
                        r.x - delayX,
                        r.y,
                        r.frame,
                        r.dir,
                        r.estado,
                        r.vY,
                        alpha
                    );
                });

                ctx.restore();
            }

            if ((Date.now() < tempoDano + duracaoInvulnerabilidade) ? Math.floor(Date.now() / 100) % 2 === 0 : true) {
                desenharcat(
                    cat.currentX,
                    cat.y,
                    cat.frameAtual,
                    cat.direcao,
                    cat.estado,
                    cat.velY,
                    obterAlphaTransformacao()
                );
            }
                        // === BEAR PARADO NO MUNDO (durante cutscene) ===
            if (cutsceneInicialAtiva && imgBearMoto2.complete) {
                ctx.save();
                ctx.translate(-scrollX, 0);
                ctx.drawImage(imgBearMoto2, bearMotoWorldX, bearMotoWorldY, 160, 140);
                ctx.restore();
            }

            // === POPUP BRANCO (UI fixa) ===
                        // === POPUP + SPRITES DA CUTSCENE ===
            if (cutsceneInicialAtiva) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);

                if (cutsceneInicialStep < 5) {   // popup só enquanto não saiu o bear
                    ctx.fillStyle = `rgba(255, 255, 255, ${popupAlpha * 0.95})`;
                    ctx.fillRect(280, 160, 720, 360);
                    ctx.strokeStyle = "#00ffff";
                    ctx.lineWidth = 8;
                    ctx.strokeRect(280, 160, 720, 360);

                    // Sprites dentro do popup
                    if (cutsceneInicialStep === 1) {
                        let spkFrame = (Date.now() % 400 < 200) ? imgSpk1 : imgSpk2;
                        if (spkFrame.complete) ctx.drawImage(spkFrame, 380, 210, 200, 270);
                    }
                    else if (cutsceneInicialStep === 2) {
                        if (imgBearPose2.complete) ctx.drawImage(imgBearPose2, 380, 230, 200, 200);
                    }
                    else if (cutsceneInicialStep === 3) {
                        if (imgInternPose.complete) ctx.drawImage(imgInternPose, 350, 230, 250, 250);
                    }

                    // Texto
                    ctx.fillStyle = "#000000";
                    ctx.font = "bold 32px monospace";
                    ctx.textAlign = "left";
                    const linhasDialogo = textoAtual.split("\n");
                    const alturaLinha = 42;

                    linhasDialogo.forEach((linha, indice) => {
                        ctx.fillText(linha, 600, 320 + indice * alturaLinha);
                    });
                }

                ctx.restore();
            }

            // === BEARMOTO2 ANDANDO NO MUNDO ===
            if (cutsceneInicialAtiva && cutsceneInicialStep === 5 && imgBearMoto2.complete) {
                ctx.save();
                ctx.translate(-scrollX, 0);
                ctx.drawImage(imgBearMoto2, bearMotoWorldX, bearMotoWorldY, 120, 140);
                ctx.restore();
            }

            // CAMADA 4: Interface e Debug
            // === PARTÍCULAS DE POEIRA ===
            for (let i = particulasPoeira.length - 1; i >= 0; i--) {
                const p = particulasPoeira[i];
                p.x += p.velX;
                p.y += p.velY;
                p.velY += 0.08; // gravidade leve
                p.alpha -= 0.035;
                p.vida--;
                if (p.vida <= 0 || p.alpha <= 0) { particulasPoeira.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.fillStyle = "#c8b89a";
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, p.raio, p.raio * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            desenharTodasHitboxes();
            desenharHUD();
            if (ferramentaEdicaoAtiva) {
               // desenharEditorCoords();//  <--- ADICIONE AS BARRAS AQUI para esmagar as coordenadas do mouse
                ctx.fillStyle = "yellow";
                ctx.font = "bold 14px monospace";
                ctx.fillText(`PINCEL [1-5]: ${catalogoEdicao[pincelAtual].nome.toUpperCase()}`, 30, 200);
            }
            if (exibindoMenuTeleporte) desenharMenuDebug();
            if (godMode) {
                ctx.fillStyle = "cyan";
                ctx.font = "bold 16px monospace";
                ctx.fillText("GOD MODE: ACTIVE", 30, 100);
            }

            ctx.restore(); // Fecha o save inicial (Tremor)

                        // --- CAMADA FINAL: FADES E VÍDEO ---

            // 1. Desenha a Imagem Preta (preto.png) - se estiver ativo
            if (fadePretoAlpha > 0 && imgPreta.complete) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalAlpha = fadePretoAlpha;
                ctx.drawImage(imgPreta, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            // 2. DESENHA O VÍDEO FINAL (principal)
            if (videoFinalAtivo && videoFinal) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);   // Isola completamente do resto
                ctx.drawImage(videoFinal, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
            // 3. Fallback: imagem estática com fade (caso o vídeo não rode)
            else if (finalFadeAlpha > 0 && imgFinalCreditos.complete) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalAlpha = finalFadeAlpha;
                ctx.drawImage(imgFinalCreditos, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            ctx.restore(); // Fecha o save inicial do tremor
        }


               function desenharcat(x, y, frame, dir, estado, velY, alfa) {
                    let img = imgcatStand;
                    if (estado === "pulando") img = (velY < 0) ? imgJump1 : imgJump2;
                    else if (estado === "correndo") img = imgsRun[frame];

                    if (img && img.complete) {
                        const escalaBase = 1.25;
                        const escala = escalaBase * (cat.crescido ? 1.15 : 1);
                        let larguraVisual = cat.altura * (img.naturalWidth / img.naturalHeight) * escala;
                        let alturaVisual = cat.altura * escala;

                        // Compensação Y para não afundar no chão
                        const offsetY = (alturaVisual - cat.altura) * 0.92;   // 92% da diferença para ficar natural

                        ctx.save();
                        ctx.globalAlpha = alfa;
                        ctx.translate(x, y - offsetY);   // sobe o desenho

                        if (dir === -1) ctx.scale(-escala, escala);
                        else ctx.scale(escala, escala);

                        ctx.drawImage(img, -larguraVisual / (2 * escala), 0, larguraVisual / escala, alturaVisual / escala);
                        ctx.restore();
                    }
                }

        function desenharHUD() {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
            if (imgLifeTxt.complete) ctx.drawImage(imgLifeTxt, 30, 25, 80, 30);

            const heartLockCarregado = imgHeartLock.complete && imgHeartLock.naturalWidth !== 0;
            const alvoHeartLock = cat.crescido && heartLockCarregado ? 1 : 0;
            transicaoHeartLock += (alvoHeartLock - transicaoHeartLock) * 0.12;
            if (Math.abs(alvoHeartLock - transicaoHeartLock) < 0.01) {
                transicaoHeartLock = alvoHeartLock;
            }

            ctx.imageSmoothingEnabled = false;
            if (imgHeart.complete) {
                for (let i = 0; i < 6; i++) {
                    const xHeart = 30 + (i * 45);
                    const vidaAtiva = i < vida;

                    if (!vidaAtiva) {
                        ctx.globalAlpha = 0.2;
                        ctx.drawImage(imgHeart, xHeart, 60, 40, 40);
                        continue;
                    }

                    ctx.globalAlpha = 1 - transicaoHeartLock;
                    ctx.drawImage(imgHeart, xHeart, 60, 40, 40);

                    if (heartLockCarregado) {
                        ctx.globalAlpha = transicaoHeartLock;
                        ctx.drawImage(imgHeartLock, xHeart, 60, 40, 40);
                    }
                }
            }

            ctx.globalAlpha = 1;
           //ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(30, 110, 180, 30);
            //ctx.fillStyle = "#00ff00"; ctx.font = "bold 18px monospace"; // ctx.fillText(`POS X: ${Math.floor(cat.worldX)}px`, 40, 132);
            ctx.restore();
        }

        function desenharEditorCoords() {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
            //ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(10, 150, 220, 35);
            //ctx.fillStyle = "yellow"; ctx.font = "bold 16px monospace"; // ctx.fillText(`MOUSE X:${mouseWorldX} Y:${mouseWorldY}`, 20, 173);
            const cursorX = mouseWorldX - scrollX;
            ctx.strokeStyle = "yellow"; ctx.beginPath(); ctx.moveTo(cursorX - 15, mouseWorldY); ctx.lineTo(cursorX + 15, mouseWorldY); ctx.moveTo(cursorX, mouseWorldY - 15); ctx.lineTo(cursorX, mouseWorldY + 15); ctx.stroke();
            ctx.restore();
        }

        // --- FUNÇÃO DO MENU ATUALIZADA ---
        function desenharMenuDebug() {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);

            const menuW = 500;
            const menuH = 300;
            const x = canvas.width / 2 - menuW / 2;
            const y = canvas.height / 2 - menuH / 2;

            // Fundo e Borda
            ctx.fillStyle = "rgba(0, 0, 0, 0.95)";
            ctx.fillRect(x, y, menuW, menuH);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, menuW, menuH);

            // Cabeçalho
            ctx.fillStyle = "white";
            ctx.font = "bold 20px monospace";
            ctx.textAlign = "center";
            ctx.fillText(`LEVEL ${menuDebug.faseSelecionada} (A/D PARA MUDAR)`, x + menuW / 2, y + 35);
            ctx.strokeStyle = "#444";
            ctx.beginPath(); ctx.moveTo(x + 20, y + 55); ctx.lineTo(x + menuW - 20, y + 55); ctx.stroke();

            // Área de Itens (com Clip para rolagem)
            const areaX = x + 20;
            const areaY = y + 70;
            const areaW = menuW - 40;
            const areaH = 210;

            ctx.save();
            ctx.beginPath();
            ctx.rect(areaX, areaY, areaW, areaH);
            ctx.clip();

            const setores = menuDebug.pontos[menuDebug.faseSelecionada];
            setores.forEach((s, i) => {
                const itemY = areaY + (i * alturaItem) - scrollMenu;

                // Destaque de Seleção (W/S)
                if (i === indiceSelecaoMenu) {
                    ctx.fillStyle = "rgba(0, 255, 0, 0.2)";
                    ctx.fillRect(areaX, itemY, areaW, alturaItem);
                    ctx.strokeStyle = "#00ff00";
                    ctx.strokeRect(areaX, itemY, areaW, alturaItem);
                }

                ctx.fillStyle = (i === indiceSelecaoMenu) ? "#00ff00" : "white";
                ctx.font = "16px monospace";
                ctx.textAlign = "left";
                ctx.fillText(`> ${s.nome}`, areaX + 15, itemY + 25);
            });
            ctx.restore();

            // Barra de rolagem minimalista
            if (setores.length * alturaItem > areaH) {
                const scrollH = (areaH / (setores.length * alturaItem)) * areaH;
                const scrollY = areaY + (scrollMenu / (setores.length * alturaItem)) * areaH;
                ctx.fillStyle = "#555";
                ctx.fillRect(x + menuW - 10, areaY, 4, areaH);
                ctx.fillStyle = "#00ff00";
                ctx.fillRect(x + menuW - 10, scrollY, 4, scrollH);
            }
            
        

            ctx.restore();
            
        }

        function desenharPausa() {
            desenharCena(); // Mantém a cena visível atrás
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Painel central
            const pw = 420, ph = 220;
            const px = canvas.width / 2 - pw / 2, py = canvas.height / 2 - ph / 2;
            ctx.fillStyle = "rgba(20, 10, 30, 0.95)";
            ctx.strokeStyle = "#00ffff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(px, py, pw, ph, 16);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#00ffff";
            ctx.font = "bold 42px monospace";
            ctx.textAlign = "center";
            ctx.fillText("PAUSED", canvas.width / 2, py + 75);

            ctx.fillStyle = "rgba(0,255,255,0.12)";
            ctx.fillRect(px + 20, py + 100, pw - 40, 2);

            ctx.fillStyle = "#ffffff";
            ctx.font = "18px monospace";
            ctx.fillText("Pressione ESC para continuar", canvas.width / 2, py + 135);
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.font = "14px monospace";
            ctx.fillText("[ G ] God Mode  |  [ F8 ] Teleporte", canvas.width / 2, py + 170);
            ctx.restore();
        }

        // Rastreia se o botão de reiniciar está em hover
        let gameOverBtnHover = false;
        canvas.addEventListener("mousemove", (e) => {
            if (!gameOver) { gameOverBtnHover = false; return; }
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const bw = 280, bh = 54;
            const bx = canvas.width / 2 - bw / 2;
            const by = canvas.height / 2 + 55;
            gameOverBtnHover = (mx > bx && mx < bx + bw && my > by && my < by + bh);
            canvas.style.cursor = gameOverBtnHover ? "pointer" : "crosshair";
        });
        canvas.addEventListener("click", (e) => {
            if (!gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const bw = 280, bh = 54;
            const bx = canvas.width / 2 - bw / 2;
            const by = canvas.height / 2 + 55;
            if (mx > bx && mx < bx + bw && my > by && my < by + bh) {
                resetarParaMenu();
                gameOver = false;
                gameState = "menu";
            }
        });

        function exibirGameOver() {
                bgmLevel1.pause(); bgmLevel1.currentTime = 0;
                bgmArena.pause(); bgmArena.currentTime = 0;

                // Redesenha a cena congelada como fundo
                ctx.fillStyle = "rgba(0,0,0,0.82)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Painel
                const pw = 520, ph = 240;
                const px = canvas.width / 2 - pw / 2, py = canvas.height / 2 - ph / 2 - 20;
                ctx.fillStyle = "rgba(80, 0, 20, 0.92)";
                ctx.strokeStyle = "#ff3366";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(px, py, pw, ph, 16);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = "#ff3366";
                ctx.font = "bold 58px monospace";
                ctx.textAlign = "center";
                ctx.shadowColor = "#ff3366";
                ctx.shadowBlur = 18;
                ctx.fillText("MISSION FAILED", canvas.width / 2, py + 80);
                ctx.shadowBlur = 0;

                ctx.fillStyle = "rgba(255,51,102,0.3)";
                ctx.fillRect(px + 20, py + 100, pw - 40, 2);

                // Botão de reiniciar
                const bw = 280, bh = 54;
                const bx = canvas.width / 2 - bw / 2;
                const by = py + ph - 10;
                ctx.fillStyle = gameOverBtnHover ? "#ff3366" : "rgba(255,51,102,0.15)";
                ctx.strokeStyle = "#ff3366";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(bx, by, bw, bh, 10);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = gameOverBtnHover ? "#000" : "#ffffff";
                ctx.font = "bold 20px monospace";
                ctx.fillText("↺  F5 to try again", canvas.width / 2, by + 34);

                requestAnimationFrame(exibirGameOver);
            }

        loop();
    </script>
